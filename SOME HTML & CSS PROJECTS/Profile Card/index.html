<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

</head>

<body>

<div class="profile-card">
    <div class="image">
        <img src="profile img.jpg" alt="" class="profileimg">
    </div>

    <div class="text-data">
        <span class="name">Prabhpreet Singh</span>
        <span class="job">Student</span>
    </div>

    <div class="handles">
        <a href="#" class="link insta">
            <i class='bx bxl-instagram'></i>
        </a>
        <a href="#" class="link snap">
            <i class='bx bxl-snapchat'></i>
        </a>
        <a href="#" class="link yt ">
            <i class='bx bxl-youtube'></i>
        </a>
        <a href="#" class="link twitter">
            <i class='bx bxl-twitter'></i>
        </a>
    </div>

    <div class="buttons">
        <button class="button">Connect?</button>
        <button class="button">More About Me</button>
    </div>

</div>

</body>

</html>
